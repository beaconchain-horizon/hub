    <style>
        /* ---------- reset & base ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            padding: 2rem 1.5rem;
            line-height: 1.6;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        /* ---------- header (Changelog style) ---------- */
        .changelog-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1.5rem;
            margin-bottom: 2.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #21262d;
        }

        .changelog-header h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .changelog-header h1 .badge-year {
            font-size: 0.9rem;
            font-weight: 600;
            background: #1f6feb;
            color: #fff;
            padding: 0.1rem 0.9rem;
            border-radius: 40px;
            letter-spacing: 0.3px;
        }

        .changelog-header .meta-links {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            font-size: 0.9rem;
            color: #8b949e;
        }

        .changelog-header .meta-links a {
            color: #58a6ff;
            text-decoration: none;
            font-weight: 500;
        }

        .changelog-header .meta-links a:hover {
            text-decoration: underline;
        }

        /* ---------- filter bar (tag / month) ---------- */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.75rem 1.5rem;
            margin-bottom: 2.5rem;
            padding: 0.75rem 1.25rem;
            background: #161b22;
            border-radius: 12px;
            border: 1px solid #21262d;
        }

        .filter-bar .label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .filter-bar .tag-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }

        .filter-bar .tag {
            display: inline-block;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 500;
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            cursor: default;
            transition: 0.2s;
        }

        .filter-bar .tag.active {
            background: #1f6feb;
            color: #fff;
            border-color: #1f6feb;
        }

        .filter-bar .tag i {
            margin-left: 0.3rem;
            font-size: 0.65rem;
            opacity: 0.7;
        }

        /* ---------- entry list (Changelog style) ---------- */
        .entry-list {
            display: flex;
            flex-direction: column;
            gap: 1.75rem;
        }

        .entry-item {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 1.5rem 2rem;
            padding: 1.25rem 1.5rem;
            background: #161b22;
            border-radius: 12px;
            border: 1px solid #21262d;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .entry-item:hover {
            border-color: #30363d;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .entry-item .date {
            font-size: 0.85rem;
            font-weight: 600;
            color: #8b949e;
            white-space: nowrap;
            padding-top: 0.1rem;
        }

        .entry-item .date i {
            margin-left: 0.4rem;
            font-size: 0.75rem;
            color: #58a6ff;
        }

        .entry-item .content {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .entry-item .content .title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #f0f6fc;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.6rem;
        }

        .entry-item .content .title .product-badge {
            font-size: 0.6rem;
            font-weight: 600;
            text-transform: uppercase;
            padding: 0.1rem 0.7rem;
            border-radius: 30px;
            background: #1f6feb22;
            color: #58a6ff;
            border: 1px solid #1f6feb44;
        }

        .entry-item .content .title .product-badge.gold {

            color: #e3b341;
            border-color: #d2992255;
        }

        .entry-item .content .title .product-badge.pink {

        }

        .entry-item .content .title .product-badge.purple {
            background: #8957e533;
            color: #b387f0;
            border-color: #8957e555;
        }

        .entry-item .content .description {
            font-size: 0.92rem;
            color: #b1bac4;
            max-width: 680px;
        }

        .entry-item .content .meta-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.6rem 1.2rem;
            margin-top: 0.2rem;
            font-size: 0.8rem;
            color: #8b949e;
        }

        .entry-item .content .meta-row .price {
            font-weight: 700;
            color: #f0f6fc;
            font-size: 0.95rem;
        }

        .entry-item .content .meta-row .price span {
            color: #8b949e;

        .entry-item .content .meta-row .tags {

            flex-wrap: wrap;

        }

        .entry-item .content .meta-row .tags span {
            background: #21262d;
            padding: 0.1rem 0.7rem;
            border-radius: 30px;
            font-size: 0.65rem;
            color: #8b949e;
            border: 1px solid #30363d;
        }

        .entry-item .content .action-btn {

            align-self: flex-start;

            color: #fff;

            color: #58a6ff;
        }

        /* ---------- footer ---------- */

            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid #21262d;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;

            .entry-item .content .title {

            }

            .entry-item .content .meta-row {
                font-size: 0.7rem;
            }

            .filter-bar .tag {
                font-size: 0.65rem;
                padding: 0.1rem 0.7rem;
            }
        }
    </style>

        // ---------- render products as changelog entries ----------
        function renderProducts() {
            const container = document.getElementById('productList');
            if (!container) return;

            // sort by price (low to high) to mimic a logical changelog order
            const sorted = [...products].sort((a, b) => a.priceUsd - b.priceUsd);

            container.innerHTML = sorted.map((p, index) => {
                // fake date – based on index to give a "changelog" feel
                const month = String(1 + (index % 12)).padStart(2, '0');
                const day = String(10 + (index * 3) % 20).padStart(2, '0');
                const dateLabel = `۲۰۲۵-${month}-${day}`;

                const badgeClass = p.badgeColor ? `product-badge ${p.badgeColor}` : 'product-badge';

                return `
                    <div class="entry-item" data-id="${p.id}">
                        <div class="date">
                            <i class="far fa-calendar-alt"></i> ${dateLabel}
                        </div>
                        <div class="content">
                            <div class="title">
                                <i class="fas ${p.icon}" style="color:#58a6ff; font-size:1rem;"></i>
                                ${p.name}
                                <span class="${badgeClass}">${p.badge}</span>
                            </div>
                            <div class="description">${p.description}</div>
                            <div class="meta-row">
                                <span class="price">
                                    $${p.priceUsd.toFixed(2)} USD
                                    <span>(${p.priceEth} ETH)</span>
                                </span>
                                <span style="color:#484f58;">|</span>
                                <span>${p.volume.toLocaleString()} req</span>
                                <span style="color:#484f58;">|</span>
                                <span class="tags">
                                    ${p.tags.map(t => `<span>#${t}</span>`).join('')}
                                </span>
                            </div>
                            <button class="action-btn generate-btn"
                                    data-id="${p.id}"
                                    data-name="${p.name}"
                                    data-volume="${p.volume}">
                                <i class="fas fa-file-certificate"></i> تولید لایسنس
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            // attach click events to all generate buttons
            document.querySelectorAll('.generate-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    const id = this.dataset.id;
                    const name = this.dataset.name;
                    const volume = parseInt(this.dataset.volume, 10);
                    const product = products.find(p => p.id === id);
                    if (product) {
                        generateLicense(product, name);
                    } else {
                        generateLicense({ volume, priceUsd: 0, priceEth: 0 }, name);
                    }
                });
            });
        }

        // ---------- Merkle license generator (simplified, async) ----------
        async function sha256(input) {
            const hash = await crypto.subtle.digest('SHA-256', input);
            return new Uint8Array(hash);
        }

        function toHex(arr) {
            return Array.from(arr).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        class MerkleLicense {
            constructor(volume, seed = crypto.getRandomValues(new Uint8Array(32))) {
                this.volume = volume;
                this.seed = seed;
                this.root = null;
            }

            async generate() {
                const leaves = [];
                for (let i = 0; i < this.volume; i++) {
                    const indexBuf = new Uint8Array(4);
                    new DataView(indexBuf.buffer).setUint32(0, i, true);
                    const concat = new Uint8Array(this.seed.length + indexBuf.length);
                    concat.set(this.seed, 0);
                    concat.set(indexBuf, this.seed.length);
                    leaves.push(await sha256(concat));
                }
                let level = leaves;
                while (level.length > 1) {
                    const next = [];
                    for (let i = 0; i < level.length; i += 2) {
                        const left = level[i];
                        const right = (i + 1 < level.length) ? level[i + 1] : left;
                        const concat = new Uint8Array(left.length + right.length);
                        concat.set(left, 0);
                        concat.set(right, left.length);
                        next.push(await sha256(concat));
                    }
                    level = next;
                }
                this.root = level[0] || new Uint8Array(32);
                return this.root;
            }
        }

        async function generateLicense(product, productName) {
            const output = document.getElementById('licenseOutput');
            if (!output) return;

            const volume = product.volume || 100;
            output.innerHTML = `<span class="prompt">$</span> ⏳ در حال تولید درخت مرکل برای ${volume.toLocaleString()} درخواست...`;

            try {
                const lic = new MerkleLicense(volume);
                const root = await lic.generate();
                const rootHex = toHex(root);
                const timestamp = Date.now();

                const licenseData = {
                    version: 3,
                    product: productName || 'Horizon License',
                    volume: volume,
                    root: rootHex,
                    timestamp: timestamp,
                    createdBy: 'Beaconchain Horizon',
                    seedPreview: toHex(lic.seed).slice(0, 16) + '…',
                    network: 'Ethereum',
                    wallet: '0x4E94F10F0a34a0DF229e68d5902644046258D678'
                };

                // download JSON
                const blob = new Blob([JSON.stringify(licenseData, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `license_${volume}_${timestamp}.license`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                const dateStr = new Date(timestamp).toLocaleString('fa-IR');
                output.innerHTML =
                    `<span class="prompt">$</span> ✅ لایسنس تولید شد!\n` +
                    `   📄 حجم: ${volume.toLocaleString()} درخواست\n` +
                    `   🌳 Merkle Root: ${rootHex.slice(0, 48)}…\n` +
                    `   ⏱️ زمان: ${dateStr}\n` +
                    `   📥 فایل دانلود شد.`;

            } catch (err) {
                output.innerHTML = `<span class="prompt">$</span> ❌ خطا: ${err.message}`;
            }
        }

        // ---------- init ----------
        renderProducts();

        // expose generateLicense for console debugging
        window.generateLicense = generateLicense;

        console.log('🚀 Horizon Store · Changelog 2025 style loaded.');
        console.log(`📦 ${products.length} products available.`);
    })();
</script>
